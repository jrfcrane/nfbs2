<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - NFBS Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0F172A',
                        secondary: '#2563EB',
                        accent: '#60A5FA',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Top Nav -->
    <nav class="bg-primary text-white px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="/admin/dashboard" class="text-gray-300 hover:text-white transition">
                <i class="fa-solid fa-arrow-left mr-2"></i> Back to Dashboard
            </a>
        </div>
        <a href="/admin/logout" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg text-sm transition">
            <i class="fa-solid fa-sign-out-alt mr-1"></i> Logout
        </a>
    </nav>

    <div class="max-w-lg mx-auto px-6 py-8">
        <h2 class="text-2xl font-bold text-primary mb-6">Account Settings</h2>

        <!-- Success Banner -->
        <div id="success-banner" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-4 text-sm">
            <i class="fa-solid fa-check-circle mr-1"></i> <span id="success-msg"></span>
        </div>

        <!-- Error Banner -->
        <div id="error-banner" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm"></div>

        <!-- Change Username -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <h3 class="font-bold text-lg mb-4">Change Username</h3>
            <form id="username-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Current Username</label>
                    <input type="text" id="current-username" class="w-full px-4 py-3 rounded-lg border border-gray-300 bg-gray-50 text-gray-500" readonly>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">New Username</label>
                    <input type="text" id="new-username" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none">
                </div>
                <button type="submit" class="bg-secondary hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold transition">
                    Update Username
                </button>
            </form>
        </div>

        <!-- Change Password -->
        <div class="bg-white rounded-xl shadow-sm p-6">
            <h3 class="font-bold text-lg mb-4">Change Password</h3>
            <form id="password-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Current Password</label>
                    <input type="password" id="current-password" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">New Password</label>
                    <input type="password" id="new-password" required minlength="4"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Confirm New Password</label>
                    <input type="password" id="confirm-password" required minlength="4"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none">
                </div>
                <button type="submit" class="bg-secondary hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold transition">
                    Update Password
                </button>
            </form>
        </div>
    </div>

    <script>
        // Load current username
        fetch('/api/admin/account')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                document.getElementById('current-username').value = data.username;
            });

        // Change username
        document.getElementById('username-form').addEventListener('submit', function(e) {
            e.preventDefault();
            hideMessages();
            var newUsername = document.getElementById('new-username').value.trim();
            if (!newUsername) return;

            fetch('/api/admin/account/username', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: newUsername })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) {
                    showError(data.error);
                } else {
                    showSuccess('Username updated to "' + newUsername + '".');
                    document.getElementById('current-username').value = newUsername;
                    document.getElementById('new-username').value = '';
                }
            });
        });

        // Change password
        document.getElementById('password-form').addEventListener('submit', function(e) {
            e.preventDefault();
            hideMessages();
            var currentPw = document.getElementById('current-password').value;
            var newPw = document.getElementById('new-password').value;
            var confirmPw = document.getElementById('confirm-password').value;

            if (newPw !== confirmPw) {
                showError('New passwords do not match.');
                return;
            }

            fetch('/api/admin/account/password', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ currentPassword: currentPw, newPassword: newPw })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) {
                    showError(data.error);
                } else {
                    showSuccess('Password updated successfully.');
                    document.getElementById('current-password').value = '';
                    document.getElementById('new-password').value = '';
                    document.getElementById('confirm-password').value = '';
                }
            });
        });

        function showError(msg) {
            document.getElementById('error-banner').textContent = msg;
            document.getElementById('error-banner').classList.remove('hidden');
        }
        function showSuccess(msg) {
            document.getElementById('success-msg').textContent = msg;
            document.getElementById('success-banner').classList.remove('hidden');
        }
        function hideMessages() {
            document.getElementById('error-banner').classList.add('hidden');
            document.getElementById('success-banner').classList.add('hidden');
        }
    </script>
</body>
</html>
