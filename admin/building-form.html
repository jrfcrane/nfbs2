<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Building Form - NFBS Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0F172A',
                        secondary: '#2563EB',
                        accent: '#60A5FA',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Top Nav -->
    <nav class="bg-primary text-white px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="/admin/dashboard" class="text-gray-300 hover:text-white transition">
                <i class="fa-solid fa-arrow-left mr-2"></i> Back to Dashboard
            </a>
        </div>
        <div class="flex items-center gap-4">
            <a href="/admin/leads" class="text-gray-300 hover:text-white text-sm transition">
                <i class="fa-solid fa-inbox mr-1"></i> Leads
            </a>
            <a href="/admin/promo" class="text-gray-300 hover:text-white text-sm transition">
                <i class="fa-solid fa-bullhorn mr-1"></i> Promo
            </a>
            <a href="/admin/logout" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg text-sm transition">
                <i class="fa-solid fa-sign-out-alt mr-1"></i> Logout
            </a>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-6 py-8">
        <h2 id="page-title" class="text-2xl font-bold text-primary mb-6">Add New Steel Building</h2>

        <!-- Error Banner -->
        <div id="error-banner" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm"></div>

        <form id="building-form" class="bg-white rounded-xl shadow-sm p-6 space-y-6">
            <!-- Name & Slug -->
            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Name *</label>
                    <input type="text" id="name" required placeholder="e.g. 24x30 Vertical Garage"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Slug *</label>
                    <input type="text" id="slug" required placeholder="auto-generated-from-name"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none bg-gray-50">
                </div>
            </div>

            <!-- Category & Building Type -->
            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Category *</label>
                    <select id="category" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none">
                        <option value="carport">Carport</option>
                        <option value="garage">Garage</option>
                        <option value="barn">Barn</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Building Type</label>
                    <select id="building_type"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none">
                        <option value="carport">Carport</option>
                        <option value="garage">Garage</option>
                        <option value="barn">Barn</option>
                        <option value="rv-cover">RV / Boat Cover</option>
                        <option value="workshop">Workshop</option>
                    </select>
                </div>
            </div>

            <!-- Dimensions -->
            <div class="grid md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Width *</label>
                    <select id="width" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none">
                        <option value="12">12'</option>
                        <option value="18">18'</option>
                        <option value="20">20'</option>
                        <option value="24" selected>24'</option>
                        <option value="26">26'</option>
                        <option value="28">28'</option>
                        <option value="30">30'</option>
                        <option value="32">32'</option>
                        <option value="34">34'</option>
                        <option value="36">36'</option>
                        <option value="38">38'</option>
                        <option value="40">40'</option>
                        <option value="42">42'</option>
                        <option value="44">44'</option>
                        <option value="46">46'</option>
                        <option value="50">50'</option>
                        <option value="52">52'</option>
                        <option value="54">54'</option>
                        <option value="56">56'</option>
                        <option value="58">58'</option>
                        <option value="60">60'</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Length *</label>
                    <select id="length" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none">
                        <option value="20">20'</option>
                        <option value="25">25'</option>
                        <option value="30" selected>30'</option>
                        <option value="35">35'</option>
                        <option value="40">40'</option>
                        <option value="50">50'</option>
                        <option value="60">60'</option>
                        <option value="80">80'</option>
                        <option value="100">100'</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Height (Leg) *</label>
                    <select id="height" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none">
                        <option value="8">8'</option>
                        <option value="9">9'</option>
                        <option value="10" selected>10'</option>
                        <option value="11">11'</option>
                        <option value="12">12'</option>
                        <option value="13">13'</option>
                        <option value="14">14'</option>
                        <option value="15">15'</option>
                        <option value="16">16'</option>
                    </select>
                </div>
            </div>

            <!-- Roof & Enclosure -->
            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Roof Style</label>
                    <select id="roof_style"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none">
                        <option value="regular">Regular Roof</option>
                        <option value="a-frame">A-Frame (Boxed Eave)</option>
                        <option value="vertical">Vertical Roof</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Enclosure</label>
                    <select id="enclosure"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none">
                        <option value="open">Open (No Walls)</option>
                        <option value="partial">Partially Enclosed</option>
                        <option value="full">Fully Enclosed</option>
                    </select>
                </div>
            </div>

            <!-- Doors & Windows -->
            <div class="grid md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Garage Doors</label>
                    <input type="text" id="garage_doors" placeholder="e.g. 1x 10x10"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Walk-in Doors</label>
                    <input type="text" id="walkin_doors" placeholder="e.g. 1x 36x80"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Windows</label>
                    <input type="text" id="windows" placeholder="e.g. 2x 30x30"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none">
                </div>
            </div>

            <!-- Concrete & Certified -->
            <div class="flex gap-6">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="concrete"
                        class="w-5 h-5 text-secondary rounded border-gray-300 focus:ring-secondary">
                    <span class="font-medium">Concrete Anchors</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="certified"
                        class="w-5 h-5 text-secondary rounded border-gray-300 focus:ring-secondary">
                    <span class="font-medium">Certified</span>
                </label>
            </div>

            <!-- Photos Upload -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Photos (up to 5)</label>
                <div id="photo-previews" class="flex flex-wrap gap-3 mb-3"></div>
                <div id="upload-zone"
                    class="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:border-secondary hover:bg-blue-50/30 transition cursor-pointer"
                    onclick="document.getElementById('file-input').click();"
                    ondragover="event.preventDefault(); this.classList.add('border-secondary','bg-blue-50/30');"
                    ondragleave="this.classList.remove('border-secondary','bg-blue-50/30');"
                    ondrop="event.preventDefault(); this.classList.remove('border-secondary','bg-blue-50/30'); handleFiles(event.dataTransfer.files);">
                    <i class="fa-solid fa-cloud-arrow-up text-3xl text-gray-400 mb-2"></i>
                    <p class="text-sm text-gray-500">Drag & drop photos here or <span class="text-secondary font-semibold">click to browse</span></p>
                    <p class="text-xs text-gray-400 mt-1">JPEG, PNG or WebP &middot; Max 5MB each</p>
                </div>
                <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" multiple class="hidden"
                    onchange="handleFiles(this.files); this.value='';">
                <div id="upload-error" class="hidden text-red-600 text-sm mt-2"></div>
            </div>

            <!-- Description -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Description</label>
                <textarea id="description" rows="3" placeholder="Describe this building..."
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none"></textarea>
            </div>

            <!-- Price -->
            <div class="bg-blue-50 p-4 rounded-lg">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Price *</label>
                    <div class="relative">
                        <span class="absolute left-3 top-3 text-gray-400">$</span>
                        <input type="number" id="price" required placeholder="5999" min="0"
                            class="w-full pl-8 pr-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-secondary focus:border-transparent outline-none">
                    </div>
                </div>
            </div>

            <!-- Available -->
            <div class="flex items-center gap-2">
                <input type="checkbox" id="available" checked
                    class="w-5 h-5 text-secondary rounded border-gray-300 focus:ring-secondary">
                <label for="available" class="font-medium text-gray-700 cursor-pointer">Available (visible on site)</label>
            </div>

            <!-- Submit -->
            <div class="flex gap-4 pt-4">
                <button type="submit"
                    class="bg-secondary hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-bold text-lg transition shadow">
                    <i class="fa-solid fa-save mr-2"></i> <span id="submit-text">Create Steel Building</span>
                </button>
                <a href="/admin/dashboard"
                    class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-8 py-3 rounded-lg font-semibold text-lg transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>

    <script>
        var editId = null;

        // Check if editing
        var pathParts = window.location.pathname.split('/');
        var idIndex = pathParts.indexOf('buildings') + 1;
        if (idIndex > 0 && pathParts[idIndex] && pathParts[idIndex] !== 'new') {
            editId = pathParts[idIndex];
        }

        // Auto-generate slug from name
        document.getElementById('name').addEventListener('input', function() {
            if (!editId) {
                document.getElementById('slug').value = this.value
                    .toLowerCase()
                    .replace(/[^a-z0-9\s-]/g, '')
                    .replace(/\s+/g, '-')
                    .replace(/-+/g, '-')
                    .trim();
            }
        });

        // Photo upload state
        var uploadedImages = [];

        function handleFiles(fileList) {
            var files = Array.from(fileList);
            var errEl = document.getElementById('upload-error');
            errEl.classList.add('hidden');

            if (uploadedImages.length + files.length > 5) {
                errEl.textContent = 'Maximum 5 photos allowed.';
                errEl.classList.remove('hidden');
                return;
            }

            files.forEach(function(file) {
                if (!['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
                    errEl.textContent = 'Only JPEG, PNG, and WebP files are allowed.';
                    errEl.classList.remove('hidden');
                    return;
                }
                if (file.size > 5 * 1024 * 1024) {
                    errEl.textContent = 'File "' + file.name + '" exceeds 5MB limit.';
                    errEl.classList.remove('hidden');
                    return;
                }
                uploadFile(file);
            });
        }

        function uploadFile(file) {
            var idx = uploadedImages.length;
            uploadedImages.push('uploading');
            renderPhotoPreviews();

            fetch('/api/admin/upload', {
                method: 'POST',
                headers: { 'Content-Type': file.type },
                body: file
            })
            .then(function(r) {
                if (r.status === 401) { window.location.href = '/admin/login'; return null; }
                return r.json();
            })
            .then(function(data) {
                if (!data) return;
                if (data.error) {
                    uploadedImages.splice(idx, 1);
                    var errEl = document.getElementById('upload-error');
                    errEl.textContent = data.error;
                    errEl.classList.remove('hidden');
                } else {
                    uploadedImages[idx] = data.url;
                }
                renderPhotoPreviews();
            })
            .catch(function() {
                uploadedImages.splice(idx, 1);
                renderPhotoPreviews();
                var errEl = document.getElementById('upload-error');
                errEl.textContent = 'Upload failed. Please try again.';
                errEl.classList.remove('hidden');
            });
        }

        function removePhoto(idx) {
            uploadedImages.splice(idx, 1);
            renderPhotoPreviews();
        }

        function movePhoto(fromIdx, toIdx) {
            if (toIdx < 0 || toIdx >= uploadedImages.length) return;
            var item = uploadedImages.splice(fromIdx, 1)[0];
            uploadedImages.splice(toIdx, 0, item);
            renderPhotoPreviews();
        }

        function renderPhotoPreviews() {
            var container = document.getElementById('photo-previews');
            var zone = document.getElementById('upload-zone');
            container.innerHTML = '';

            uploadedImages.forEach(function(url, i) {
                var div = document.createElement('div');
                div.className = 'relative group';

                if (url === 'uploading') {
                    div.innerHTML = '<div class="w-24 h-24 bg-gray-100 rounded-lg border-2 border-gray-200 flex items-center justify-center">' +
                        '<i class="fa-solid fa-spinner fa-spin text-gray-400 text-xl"></i></div>';
                } else {
                    div.innerHTML = '<img src="' + url + '" class="w-24 h-24 object-cover rounded-lg border-2 ' + (i === 0 ? 'border-secondary' : 'border-gray-200') + '">' +
                        (i === 0 ? '<span class="absolute -top-2 -left-2 bg-secondary text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">Main</span>' : '') +
                        '<div class="absolute inset-0 bg-black/40 rounded-lg opacity-0 group-hover:opacity-100 transition flex items-center justify-center gap-1">' +
                        (i > 0 ? '<button type="button" onclick="movePhoto(' + i + ',' + (i-1) + ')" class="text-white bg-black/50 rounded-full w-6 h-6 text-xs hover:bg-black/70"><i class="fa-solid fa-arrow-left"></i></button>' : '') +
                        (i < uploadedImages.length - 1 ? '<button type="button" onclick="movePhoto(' + i + ',' + (i+1) + ')" class="text-white bg-black/50 rounded-full w-6 h-6 text-xs hover:bg-black/70"><i class="fa-solid fa-arrow-right"></i></button>' : '') +
                        '<button type="button" onclick="removePhoto(' + i + ')" class="text-white bg-red-500/80 rounded-full w-6 h-6 text-xs hover:bg-red-600"><i class="fa-solid fa-xmark"></i></button>' +
                        '</div>';
                }

                container.appendChild(div);
            });

            if (uploadedImages.length >= 5) {
                zone.classList.add('hidden');
            } else {
                zone.classList.remove('hidden');
            }
        }

        // Load building data if editing
        if (editId) {
            document.getElementById('page-title').textContent = 'Edit Steel Building';
            document.getElementById('submit-text').textContent = 'Save Changes';
            document.title = 'Edit Steel Building - NFBS Admin';

            fetch('/api/admin/buildings/' + editId)
                .then(function(r) {
                    if (r.status === 401) { window.location.href = '/admin/login'; return null; }
                    return r.json();
                })
                .then(function(b) {
                    if (!b) return;
                    document.getElementById('name').value = b.name || '';
                    document.getElementById('slug').value = b.slug || '';
                    document.getElementById('category').value = b.category || 'carport';
                    document.getElementById('building_type').value = b.building_type || 'carport';
                    document.getElementById('width').value = b.width || '24';
                    document.getElementById('length').value = b.length || '30';
                    document.getElementById('height').value = b.height || '10';
                    document.getElementById('roof_style').value = b.roof_style || 'regular';
                    document.getElementById('enclosure').value = b.enclosure || 'open';
                    document.getElementById('garage_doors').value = b.garage_doors || '';
                    document.getElementById('walkin_doors').value = b.walkin_doors || '';
                    document.getElementById('windows').value = b.windows || '';
                    document.getElementById('concrete').checked = !!b.concrete;
                    document.getElementById('certified').checked = !!b.certified;
                    document.getElementById('description').value = b.description || '';
                    if (b.price) document.getElementById('price').value = b.price;
                    document.getElementById('available').checked = !!b.available;

                    if (b.images && b.images.length > 0) {
                        uploadedImages = b.images.slice();
                    } else if (b.image) {
                        uploadedImages = [b.image];
                    }
                    renderPhotoPreviews();
                });
        }

        // Form submit
        document.getElementById('building-form').addEventListener('submit', function(e) {
            e.preventDefault();

            if (!document.getElementById('price').value) {
                showError('Price is required.');
                return;
            }

            if (uploadedImages.indexOf('uploading') !== -1) {
                showError('Please wait for all photos to finish uploading.');
                return;
            }

            var payload = {
                name: document.getElementById('name').value,
                slug: document.getElementById('slug').value,
                category: document.getElementById('category').value,
                building_type: document.getElementById('building_type').value,
                width: document.getElementById('width').value,
                length: document.getElementById('length').value,
                height: document.getElementById('height').value,
                roof_style: document.getElementById('roof_style').value,
                enclosure: document.getElementById('enclosure').value,
                garage_doors: document.getElementById('garage_doors').value,
                walkin_doors: document.getElementById('walkin_doors').value,
                windows: document.getElementById('windows').value,
                concrete: document.getElementById('concrete').checked,
                certified: document.getElementById('certified').checked,
                description: document.getElementById('description').value,
                price: document.getElementById('price').value,
                images: uploadedImages,
                available: document.getElementById('available').checked
            };

            var url = editId ? '/api/admin/buildings/' + editId : '/api/admin/buildings';
            var method = editId ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(function(r) {
                if (r.status === 401) { window.location.href = '/admin/login'; return null; }
                return r.json();
            })
            .then(function(data) {
                if (!data) return;
                if (data.error) {
                    showError(data.error);
                } else {
                    window.location.href = '/admin/dashboard';
                }
            })
            .catch(function() {
                showError('Something went wrong. Please try again.');
            });
        });

        function showError(msg) {
            var banner = document.getElementById('error-banner');
            banner.textContent = msg;
            banner.classList.remove('hidden');
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
